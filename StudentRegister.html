<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn.lk</title>
    <link rel="stylesheet" href="css/Student_Reg.css">
</head>
<body>
    <div class="container">
        <form id="registrationForm" action="student_reg.php" method="post" enctype="multipart/form-data">
            <h1>Register</h1>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dob">DOB</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <div class="form-group">
                    <label for="nic">NIC No</label>
                    <input type="number" id="nic" name="nic" required>
                </div>
                
                
                <div class="form-group gender-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="male" required>
                            Male
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="female">
                            Female
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone No.</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="alYear">A/L Year</label>
                    <select id="alYear" name="alYear" required>
                        <option value="">Select Year</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="alStream">A/L Stream</label>
                    <select id="alStream" name="alStream" required onchange="student_id()">
                        <option value="">Select Stream</option>
                        <option value="Science">Science</option>
                        <option value="Science">Maths</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Arts">Arts</option>
                        <option value="Technology">Technology</option>
                    </select>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" name="studentId" required>
            </div>

            <div class="form-group full-width">
                <label for="password">Password</label>
                <div class="password-container">
                    <input type="password" id="password" name="password" required>
                    <button type="button" class="toggle-password" data-target="password">
                    </button>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-container">
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <button type="button" class="toggle-password" data-target="confirmPassword">
                    </button>
                </div>
            </div>
            <div class="form-group full-width">
                <label for="description">Profile pic</label>
                 <input type="file" name="profile_pic" accept="image/*">
            </div>


            <div class="form-group full-width">
                <button type="submit" class="submit-btn">Register</button>
            </div>
        </form>
    </div>
<script src="js/student_id.js"></script>
 </body>
</html>
